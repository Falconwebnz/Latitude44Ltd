<!doctype html>
<!--
  GitHub Pages SPA fallback.
  Whenever GitHub serves a 404 (e.g. because a deep route like /work was
  requested directly), this page redirects to '/' while preserving the
  original path as a query string. index.html unpacks it and React Router
  takes over. Adapted from https://github.com/rafgraph/spa-github-pages.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Latitude44</title>
    <script>
      var pathSegmentsToKeep = 0; // 0 for project root domain (latitude44.co.nz)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
