        <!--
          GitHub Pages SPA fallback. When a deep link is hit (e.g. /work),
          GitHub returns 404.html which redirects to / with the original path
          stashed in sessionStorage. This script reads it back and pushes the
          correct URL into the React Router history.
        -->
        <script>
          (function (l) {
            if (l.search[1] === '/') {
              var decoded = l.search.slice(1).split('&').map(function (s) {
                return s.replace(/~and~/g, '&');
              }).join('?');
              window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
            }
          }(window.location));
        </script>
