name: Build & Deploy Latitude44 to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual run from the Actions tab
  workflow_dispatch:

# Required permissions for the official GitHub Pages deploy action
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel an in-flight deploy if a new push comes in
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build production bundle
        env:
          # No FastAPI backend on GitHub Pages — the contact form falls back to
          # Formspree when REACT_APP_FORMSPREE_ID is set. Override these in
          # repo Settings → Secrets and variables → Actions → Variables.
          REACT_APP_BACKEND_URL: ${{ vars.REACT_APP_BACKEND_URL || '' }}
          REACT_APP_FORMSPREE_ID: ${{ vars.REACT_APP_FORMSPREE_ID || '' }}
          CI: false
        run: yarn build

      - name: Upload build artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
